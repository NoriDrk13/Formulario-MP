<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Sistema tipo Excel</title>

<style>

body{
    font-family:Arial;
    background:#f4f6f9;
    padding:20px;
}

.container{
    background:white;
    padding:20px;
    border-radius:10px;
}

input{
    padding:10px;
    margin:5px;
}

button{
    cursor:pointer;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
}

th, td{
    border:1px solid #ddd;
    padding:10px;
}

th{
    background:#1e3c72;
    color:white;
}

tr:hover{
    background:#f1f1f1;
}

/* =========================
   BOTONES FILTRO (MISMA FILA)
   ========================= */
.botones-filtro{
    display:flex;
    gap:10px;
    margin-top:10px;
}

.botones-filtro button{
    flex:1;
    padding:12px;
    border:none;
    border-radius:8px;
    font-weight:bold;
}

.botones-filtro button:first-child{
    background:#1e3c72;
    color:white;
}

.botones-filtro button:last-child{
    background:#777;
    color:white;
}

</style>

</head>

<body>

<div class="container">

<h2>📊 Sistema tipo Excel</h2>

<!-- FORMULARIO -->
<input type="number" id="codigo" placeholder="Código">
<input type="text" id="descripcion" placeholder="Descripción">
<input type="number" id="cantidad" placeholder="Cantidad">
<input type="text" id="numero_guia" placeholder="Guía">
<input type="text" id="observaciones" placeholder="Observaciones">

<button onclick="guardar()">Guardar</button>

<hr>

<!-- FILTROS -->
<input type="text" id="filtroCodigo" placeholder="Filtrar Código">
<input type="text" id="filtroDescripcion" placeholder="Filtrar Descripción">
<input type="text" id="filtroCantidad" placeholder="Filtrar Cantidad">
<input type="text" id="filtroGuia" placeholder="Filtrar Guía">
<input type="text" id="filtroObs" placeholder="Filtrar Observaciones">

<!-- BOTONES EN UNA FILA -->
<div class="botones-filtro">

    <button onclick="filtrar()">🔍 Filtrar</button>
    <button onclick="limpiar()">🧹 Limpiar</button>

</div>

<!-- TABLA -->
<table>

<thead>
<tr>
<th>Código</th>
<th>Descripción</th>
<th>Cantidad</th>
<th>Guía</th>
<th>Observaciones</th>
<th>Fecha</th>
</tr>
</thead>

<tbody id="tabla"></tbody>

</table>

</div>

<script>

const URL = "https://script.google.com/macros/s/AKfycbzu7M_LZ1hMOksc4PzokL28c3aGs14m0Dvdn9-j18CyNXbiV6n7MxfEn2mDi8ZH4VBjNQ/exec"

let dataGlobal = []

// =========================
// CARGAR
// =========================
async function cargar(){

    let res = await fetch(URL + "?listar=1")
    let data = await res.json()

    dataGlobal = Array.isArray(data) ? data : []

    render(dataGlobal)
}

// =========================
// RENDER
// =========================
function render(data){

    const tabla = document.getElementById("tabla")

    let html = ""

    data.forEach(r => {

        html += `
        <tr>
            <td>${r.codigo ?? ""}</td>
            <td>${r.descripcion ?? ""}</td>
            <td>${r.cantidad ?? ""}</td>
            <td>${r.numero_guia ?? ""}</td>
            <td>${r.observaciones ?? ""}</td>
            <td>${r.fecha ?? ""}</td>
        </tr>
        `
    })

    tabla.innerHTML = html
}

// =========================
// FILTRAR
// =========================
function filtrar(){

    let c = document.getElementById("filtroCodigo").value.toLowerCase().trim()
    let d = document.getElementById("filtroDescripcion").value.toLowerCase().trim()
    let q = document.getElementById("filtroCantidad").value.toLowerCase().trim()
    let g = document.getElementById("filtroGuia").value.toLowerCase().trim()
    let o = document.getElementById("filtroObs").value.toLowerCase().trim()

    let filtrado = dataGlobal.filter(r => {

        return (
            String(r.codigo ?? "").toLowerCase().includes(c) &&
            String(r.descripcion ?? "").toLowerCase().includes(d) &&
            String(r.cantidad ?? "").toLowerCase().includes(q) &&
            String(r.numero_guia ?? "").toLowerCase().includes(g) &&
            String(r.observaciones ?? "").toLowerCase().includes(o)
        )
    })

    render(filtrado)
}

// =========================
// LIMPIAR
// =========================
function limpiar(){

    document.getElementById("filtroCodigo").value = ""
    document.getElementById("filtroDescripcion").value = ""
    document.getElementById("filtroCantidad").value = ""
    document.getElementById("filtroGuia").value = ""
    document.getElementById("filtroObs").value = ""

    render(dataGlobal)
}

// =========================
// GUARDAR (simple)
// =========================
async function guardar(){

    let datos = {
        codigo: document.getElementById("codigo").value,
        descripcion: document.getElementById("descripcion").value,
        cantidad: document.getElementById("cantidad").value,
        numero_guia: document.getElementById("numero_guia").value,
        observaciones: document.getElementById("observaciones").value
    }

    await fetch(URL, {
        method:"POST",
        body:JSON.stringify(datos)
    })

    cargar()
}

// INIT
cargar()

</script>

</body>
</html>
