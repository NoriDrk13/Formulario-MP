<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Formulario MP</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    background:linear-gradient(135deg,#1e3c72,#2a5298);
    min-height:100vh;
    padding:20px;
}

.container{
    max-width:1400px;
    margin:auto;
    background:white;
    border-radius:20px;
    padding:30px;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

h1{
    text-align:center;
    color:#1e3c72;
    margin-bottom:30px;
}

.form-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
}

.grupo{
    display:flex;
    flex-direction:column;
}

.grupo-full{
    grid-column:1 / -1;
}

input, textarea{
    padding:14px;
    border:2px solid #ddd;
    border-radius:12px;
    font-size:15px;
}

input:focus, textarea:focus{
    border-color:#2a5298;
    outline:none;
}

#descripcion{
    background:#f2f2f2;
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:12px;
    background:#1e3c72;
    color:white;
    font-size:18px;
    cursor:pointer;
    margin-top:10px;
}

.mensaje{
    margin-top:20px;
    text-align:center;
    font-weight:bold;
    font-size:16px;
}

.mensaje.ok{
    color:green;
}

.mensaje.error{
    color:red;
}

.filtros{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    gap:15px;
    margin-bottom:10px;
}

.botones-filtro{
    display:flex;
    gap:10px;
    margin-bottom:20px;
}

.botones-filtro button{
    flex:1;
    padding:12px;
    border:none;
    border-radius:10px;
    color:white;
}

.botones-filtro button:first-child{
    background:#1e3c72;
}

.botones-filtro button:last-child{
    background:#777;
}

table{
    width:100%;
    border-collapse:collapse;
}

th, td{
    padding:12px;
    border-bottom:1px solid #ddd;
}

th{
    background:#1e3c72;
    color:white;
}

</style>

</head>

<body>

<div class="container">

<h1>Formulario de Registros</h1>

<div class="form-grid">

<input type="number" id="codigo" placeholder="Código">
<input type="text" id="descripcion" placeholder="Descripción" readonly>
<input type="number" id="cantidad" placeholder="Cantidad">
<input type="text" id="numero_guia" placeholder="Guía">
<textarea id="observaciones" placeholder="Observaciones"></textarea>

<div class="grupo-full">
<button onclick="guardar()">Guardar Registro</button>
</div>

</div>

<!-- MENSAJE -->
<div id="mensaje" class="mensaje"></div>

<hr>

<h1>Registros</h1>

<div class="filtros">

<input type="text" id="filtroCodigo" placeholder="Código">
<input type="text" id="filtroDescripcion" placeholder="Descripción">
<input type="text" id="filtroCantidad" placeholder="Cantidad">
<input type="text" id="filtroGuia" placeholder="Guía">
<input type="text" id="filtroObservaciones" placeholder="Observaciones">

</div>

<div class="botones-filtro">

<button onclick="filtrar()">Filtrar</button>
<button onclick="limpiarFiltros()">Limpiar</button>

</div>

<table>

<thead>
<tr>
<th>Código</th>
<th>Descripción</th>
<th>Cantidad</th>
<th>Guía</th>
<th>Observaciones</th>
<th>Fecha</th>
</tr>
</thead>

<tbody id="tablaRegistros"></tbody>

</table>

</div>

<script>

const URL = "https://script.google.com/macros/s/AKfycbzu7M_LZ1hMOksc4PzokL28c3aGs14m0Dvdn9-j18CyNXbiV6n7MxfEn2mDi8ZH4VBjNQ/exec"

let registrosGlobal = []

// =========================
// AUTOCOMPLETAR
// =========================
document.getElementById("codigo").addEventListener("input", async function(){

    let codigo = this.value

    if(!codigo){
        document.getElementById("descripcion").value = ""
        return
    }

    let res = await fetch(`${URL}?codigo=${codigo}`)
    let data = await res.json()

    document.getElementById("descripcion").value = data.descripcion || ""
})

// =========================
// GUARDAR + MENSAJE + LIMPIAR
// =========================
async function guardar(){

    let datos = {
        codigo: document.getElementById("codigo").value,
        descripcion: document.getElementById("descripcion").value,
        cantidad: document.getElementById("cantidad").value,
        numero_guia: document.getElementById("numero_guia").value,
        observaciones: document.getElementById("observaciones").value
    }

    let res = await fetch(URL, {
        method:"POST",
        body:JSON.stringify(datos)
    })

    let data = await res.json()

    // MENSAJE
    const msg = document.getElementById("mensaje")
    msg.innerText = "✅ Datos guardados correctamente"
    msg.className = "mensaje ok"

    // LIMPIAR CAMPOS
    document.getElementById("codigo").value = ""
    document.getElementById("descripcion").value = ""
    document.getElementById("cantidad").value = ""
    document.getElementById("numero_guia").value = ""
    document.getElementById("observaciones").value = ""

    // RECARGAR TABLA
    cargarRegistros()

    // OCULTAR MENSAJE AUTOMÁTICO
    setTimeout(() => {
        msg.innerText = ""
    }, 3000)
}

// =========================
// CARGAR REGISTROS
// =========================
async function cargarRegistros(){

    let res = await fetch(URL + "?listar=1")
    let data = await res.json()

    registrosGlobal = Array.isArray(data) ? data : []

    renderTabla(registrosGlobal)
}

// =========================
// RENDER
// =========================
function renderTabla(datos){

    let tabla = document.getElementById("tablaRegistros")

    let html = ""

    datos.forEach(r => {

        html += `
        <tr>
            <td>${r.codigo ?? ""}</td>
            <td>${r.descripcion ?? ""}</td>
            <td>${r.cantidad ?? ""}</td>
            <td>${r.numero_guia ?? ""}</td>
            <td>${r.observaciones ?? ""}</td>
            <td>${r.fecha ?? ""}</td>
        </tr>
        `
    })

    tabla.innerHTML = html
}

// =========================
// FILTRO
// =========================
function filtrar(){

    let c = document.getElementById("filtroCodigo").value.toLowerCase()
    let d = document.getElementById("filtroDescripcion").value.toLowerCase()
    let q = document.getElementById("filtroCantidad").value.toLowerCase()
    let g = document.getElementById("filtroGuia").value.toLowerCase()
    let o = document.getElementById("filtroObservaciones").value.toLowerCase()

    let filtrados = registrosGlobal.filter(r => {

        return (
            String(r.codigo ?? "").toLowerCase().includes(c) &&
            String(r.descripcion ?? "").toLowerCase().includes(d) &&
            String(r.cantidad ?? "").toLowerCase().includes(q) &&
            String(r.numero_guia ?? "").toLowerCase().includes(g) &&
            String(r.observaciones ?? "").toLowerCase().includes(o)
        )
    })

    renderTabla(filtrados)
}

// =========================
// LIMPIAR
// =========================
function limpiarFiltros(){

    document.getElementById("filtroCodigo").value = ""
    document.getElementById("filtroDescripcion").value = ""
    document.getElementById("filtroCantidad").value = ""
    document.getElementById("filtroGuia").value = ""
    document.getElementById("filtroObservaciones").value = ""

    renderTabla(registrosGlobal)
}

// INIT
cargarRegistros()

</script>

</body>
</html>
