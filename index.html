

<body>

<div class="container">

    <h1>Formulario de Registro</h1>

    <div class="grupo">

        <label>Código</label>

        <input type="number"
               id="codigo"
               placeholder="Ingrese el código">

    </div>

    <div class="grupo">

        <label>Descripción</label>

        <input type="text"
               id="descripcion"
               readonly
               placeholder="Descripción automática">

    </div>

    <div class="grupo">

        <label>Cantidad</label>

        <input type="number"
               id="cantidad"
               placeholder="Ingrese cantidad">

    </div>

    <div class="grupo">

        <label>Número de Guía</label>

        <input type="text"
               id="numero_guia"
               placeholder="Ingrese número de guía">

    </div>

    <div class="grupo">

        <label>Observaciones</label>

        <textarea id="observaciones"
                  placeholder="Escriba observaciones"></textarea>

    </div>

    <button onclick="guardar()">

        Guardar Registro

    </button>

    <div class="loader"
         id="loader">

        Guardando...

    </div>

    <div class="mensaje"
         id="mensaje"></div>

</div>

<script>

    // ================================
    // PEGA TU URL DE APPS SCRIPT
    // ================================

    const URL =
    "https://script.google.com/macros/s/AKfycbzu7M_LZ1hMOksc4PzokL28c3aGs14m0Dvdn9-j18CyNXbiV6n7MxfEn2mDi8ZH4VBjNQ/exec"

    document.getElementById("codigo")
        .addEventListener("input", async function(){

        let codigo = this.value

        if(codigo === ""){

            document.getElementById("descripcion")
                .value = ""

            return
        }

        try{

            let response =
                await fetch(`${URL}?codigo=${codigo}`)

            let data =
                await response.json()

            document.getElementById("descripcion")
                .value = data.descripcion

        }
        catch(error){

            console.log(error)
        }

    })

    // ================================
    // GUARDAR DATOS
    // ================================

    async function guardar(){

        let codigo =
            document.getElementById("codigo").value

        let descripcion =
            document.getElementById("descripcion").value

        let cantidad =
            document.getElementById("cantidad").value

        let numero_guia =
            document.getElementById("numero_guia").value

        let observaciones =
            document.getElementById("observaciones").value

        // VALIDACIONES

        if(codigo === ""){

            alert("Ingrese código")

            return
        }

        if(cantidad === ""){

            alert("Ingrese cantidad")

            return
        }

        document.getElementById("loader")
            .style.display = "block"

        const datos = {

            codigo: codigo,

            descripcion: descripcion,

            cantidad: cantidad,

            numero_guia: numero_guia,

            observaciones: observaciones
        }

        try{

            let response = await fetch(URL, {

                method:"POST",

                body:JSON.stringify(datos)
            })

            let data =
                await response.json()

            document.getElementById("mensaje")
                .innerText = data.mensaje

            // LIMPIAR CAMPOS

            document.getElementById("codigo")
                .value = ""

            document.getElementById("descripcion")
                .value = ""

            document.getElementById("cantidad")
                .value = ""

            document.getElementById("numero_guia")
                .value = ""

            document.getElementById("observaciones")
                .value = ""

        }
        catch(error){

            console.log(error)

            alert("Error al guardar")
        }

        document.getElementById("loader")
            .style.display = "none"
    }

</script>

</body>
</html>
