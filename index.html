<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Formulario MP</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{

            font-family:Arial, sans-serif;

            background:linear-gradient(
                135deg,
                #1e3c72,
                #2a5298
            );

            min-height:100vh;

            display:flex;

            justify-content:center;

            align-items:center;

            padding:20px;
        }

        .container{

            background:white;

            width:100%;

            max-width:750px;

            padding:40px;

            border-radius:20px;

            box-shadow:0 10px 30px rgba(0,0,0,0.2);
        }

        h1{

            text-align:center;

            margin-bottom:30px;

            color:#1e3c72;

            font-size:34px;
        }

        .grupo{

            margin-bottom:22px;
        }

        label{

            display:block;

            margin-bottom:8px;

            font-weight:bold;

            color:#333;

            font-size:16px;
        }

        input,
        textarea{

            width:100%;

            padding:15px;

            border:2px solid #dcdcdc;

            border-radius:12px;

            font-size:16px;

            transition:0.3s;
        }

        input:focus,
        textarea:focus{

            border-color:#2a5298;

            outline:none;

            box-shadow:0 0 8px rgba(42,82,152,0.3);
        }

        textarea{

            min-height:120px;

            resize:vertical;
        }

        #descripcion{

            background:#f2f2f2;
        }

        button{

            width:100%;

            padding:16px;

            border:none;

            border-radius:12px;

            background:#1e3c72;

            color:white;

            font-size:18px;

            cursor:pointer;

            transition:0.3s;
        }

        button:hover{

            background:#16325c;

            transform:scale(1.02);
        }

        .mensaje{

            margin-top:20px;

            text-align:center;

            font-weight:bold;

            color:green;

            font-size:18px;
        }

        .loader{

            display:none;

            margin-top:15px;

            text-align:center;

            color:#1e3c72;

            font-weight:bold;
        }

    </style>

</head>

<body>

<div class="container">

    <h1>Formulario de Registro</h1>

    <div class="grupo">

        <label>Código</label>

        <input type="number"
               id="codigo"
               placeholder="Ingrese el código">

    </div>

    <div class="grupo">

        <label>Descripción</label>

        <input type="text"
               id="descripcion"
               readonly
               placeholder="Descripción automática">

    </div>

    <div class="grupo">

        <label>Cantidad</label>

        <input type="number"
               id="cantidad"
               placeholder="Ingrese cantidad">

    </div>

    <div class="grupo">

        <label>Número de Guía</label>

        <input type="text"
               id="numero_guia"
               placeholder="Ingrese número de guía">

    </div>

    <div class="grupo">

        <label>Observaciones</label>

        <textarea id="observaciones"
                  placeholder="Escriba observaciones"></textarea>

    </div>

    <button onclick="guardar()">

        Guardar Registro

    </button>

    <div class="loader"
         id="loader">

        Guardando...

    </div>

    <div class="mensaje"
         id="mensaje"></div>

</div>

<script>

    // ================================
    // PEGA TU URL DE APPS SCRIPT
    // ================================

    const URL =
    "https://script.google.com/macros/s/AKfycbzu7M_LZ1hMOksc4PzokL28c3aGs14m0Dvdn9-j18CyNXbiV6n7MxfEn2mDi8ZH4VBjNQ/exec"

    document.getElementById("codigo")
        .addEventListener("input", async function(){

        let codigo = this.value

        if(codigo === ""){

            document.getElementById("descripcion")
                .value = ""

            return
        }

        try{

            let response =
                await fetch(`${URL}?codigo=${codigo}`)

            let data =
                await response.json()

            document.getElementById("descripcion")
                .value = data.descripcion

        }
        catch(error){

            console.log(error)
        }

    })

    // ================================
    // GUARDAR DATOS
    // ================================

    async function guardar(){

        let codigo =
            document.getElementById("codigo").value

        let descripcion =
            document.getElementById("descripcion").value

        let cantidad =
            document.getElementById("cantidad").value

        let numero_guia =
            document.getElementById("numero_guia").value

        let observaciones =
            document.getElementById("observaciones").value

        // VALIDACIONES

        if(codigo === ""){

            alert("Ingrese código")

            return
        }

        if(cantidad === ""){

            alert("Ingrese cantidad")

            return
        }

        document.getElementById("loader")
            .style.display = "block"

        const datos = {

            codigo: codigo,

            descripcion: descripcion,

            cantidad: cantidad,

            numero_guia: numero_guia,

            observaciones: observaciones
        }

        try{

            let response = await fetch(URL, {

                method:"POST",

                body:JSON.stringify(datos)
            })

            let data =
                await response.json()

            document.getElementById("mensaje")
                .innerText = data.mensaje

            // LIMPIAR CAMPOS

            document.getElementById("codigo")
                .value = ""

            document.getElementById("descripcion")
                .value = ""

            document.getElementById("cantidad")
                .value = ""

            document.getElementById("numero_guia")
                .value = ""

            document.getElementById("observaciones")
                .value = ""

        }
        catch(error){

            console.log(error)

            alert("Error al guardar")
        }

        document.getElementById("loader")
            .style.display = "none"
    }

</script>

</body>
</html>
