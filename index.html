<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Excel Web Real</title>

<style>

body{
    font-family:Arial;
    background:#f4f6f9;
    padding:20px;
}

.container{
    background:white;
    padding:20px;
    border-radius:10px;
}

input{
    padding:10px;
    margin:5px;
    width:180px;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
}

th, td{
    border:1px solid #ddd;
    padding:10px;
    text-align:left;
    font-size:14px;
}

th{
    background:#1e3c72;
    color:white;
    cursor:pointer;
    position:sticky;
    top:0;
}

tr:hover{
    background:#f1f1f1;
}

.toolbar{
    margin-bottom:10px;
}

</style>

</head>

<body>

<div class="container">

<h2>📊 Excel Web Real</h2>

<div class="toolbar">

<input type="text" id="busquedaGlobal" placeholder="🔎 Buscar todo...">

<input type="text" id="filtroCodigo" placeholder="Código">
<input type="text" id="filtroDescripcion" placeholder="Descripción">
<input type="text" id="filtroCantidad" placeholder="Cantidad">

</div>

<table>

<thead>
<tr>
<th onclick="ordenar('codigo')">Código</th>
<th onclick="ordenar('descripcion')">Descripción</th>
<th onclick="ordenar('cantidad')">Cantidad</th>
<th>Guía</th>
<th>Observaciones</th>
<th>Fecha</th>
</tr>
</thead>

<tbody id="tabla"></tbody>

</table>

</div>

<script>

const URL = "https://script.google.com/macros/s/AKfycbzu7M_LZ1hMOksc4PzokL28c3aGs14m0Dvdn9-j18CyNXbiV6n7MxfEn2mDi8ZH4VBjNQ/exec"

let dataGlobal = []
let ordenAsc = true

// =========================
// CARGAR DATOS
// =========================
async function cargar(){

    let res = await fetch(URL + "?listar=1")
    let data = await res.json()

    dataGlobal = data
    render(dataGlobal)
}

// =========================
// RENDER OPTIMIZADO
// =========================
function render(data){

    const tabla = document.getElementById("tabla")

    let html = ""

    data.forEach(r => {

        html += `
        <tr>
            <td>${r.codigo ?? ""}</td>
            <td>${r.descripcion ?? ""}</td>
            <td>${r.cantidad ?? ""}</td>
            <td>${r.numero_guia ?? ""}</td>
            <td>${r.observaciones ?? ""}</td>
            <td>${r.fecha ?? ""}</td>
        </tr>
        `
    })

    tabla.innerHTML = html
}

// =========================
// FILTRO TIPO EXCEL (INSTANTÁNEO)
// =========================
function filtrar(){

    let c = document.getElementById("filtroCodigo").value.toLowerCase()
    let d = document.getElementById("filtroDescripcion").value.toLowerCase()
    let q = document.getElementById("filtroCantidad").value.toLowerCase()
    let g = document.getElementById("busquedaGlobal").value.toLowerCase()

    let filtrado = dataGlobal.filter(r => {

        let texto =
            (r.codigo + " " +
             r.descripcion + " " +
             r.cantidad + " " +
             r.numero_guia + " " +
             r.observaciones).toLowerCase()

        return (
            texto.includes(g) &&
            String(r.codigo).toLowerCase().includes(c) &&
            String(r.descripcion).toLowerCase().includes(d) &&
            String(r.cantidad).toLowerCase().includes(q)
        )
    })

    render(filtrado)
}

// eventos
document.getElementById("busquedaGlobal").addEventListener("input", filtrar)
document.getElementById("filtroCodigo").addEventListener("input", filtrar)
document.getElementById("filtroDescripcion").addEventListener("input", filtrar)
document.getElementById("filtroCantidad").addEventListener("input", filtrar)

// =========================
// ORDENAR COLUMNAS
// =========================
function ordenar(campo){

    dataGlobal.sort((a,b)=>{

        let v1 = String(a[campo] ?? "").toLowerCase()
        let v2 = String(b[campo] ?? "").toLowerCase()

        if(v1 < v2) return ordenAsc ? -1 : 1
        if(v1 > v2) return ordenAsc ? 1 : -1
        return 0
    })

    ordenAsc = !ordenAsc
    render(dataGlobal)
}

// init
cargar()

</script>

</body>
</html>
